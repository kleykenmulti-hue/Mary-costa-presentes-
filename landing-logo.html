<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mary Costa - Logo Perfumaria Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .logo-container {
            position: relative;
            width: 90%;
            max-width: 950px;
            aspect-ratio: 950 / 500;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: block;
            object-fit: contain;
        }

        #glimmerCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            display: block;
        }
    </style>
</head>

<body>

    <div class="logo-container" id="container">
        <canvas id="glimmerCanvas"></canvas>
        <img src="public/logo-mary-costa.png" class="logo-img" id="mainLogo" alt="Mary Costa Logo">
    </div>

    <script>
        const canvas = document.getElementById('glimmerCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');

        let particles = [];
        let originX, originY;
        let animationId;

        // CORES DE OURO PREMIUM (Glitters)
        const goldColors = [
            '#D4AF37', // Gold Leaf
            '#F9E29C', // Soft Gold
            '#FFFFFF', // Specular White
            '#E5C060', // Rich Gold
            '#B8860B', // Dark Gold
            '#FFD700'  // Bright Gold
        ];

        function setupCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            // Calibração de Ultra-Precisão para uploaded_image_1774150675679.png
            // O bico do borrifador está localizado exatamente em 20.2% da largura e 41.5% da altura
            originX = canvas.width * 0.2025;
            originY = canvas.height * 0.415;
        }

        class Glitter {
            constructor() {
                this.init();
            }

            init() {
                this.x = originX;
                this.y = originY;

                // Jato horizontal potente e reto no início (como na imagem)
                const angle = (Math.random() - 0.5) * 0.18;
                const speed = 3.5 + Math.random() * 6.5;

                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                this.life = 0;
                this.maxLife = 50 + Math.random() * 90;
                this.size = 0.5 + Math.random() * 1.8;
                this.opacity = 0.5 + Math.random() * 0.5;
                this.color = goldColors[Math.floor(Math.random() * goldColors.length)];

                // Shimmer (Brilho que pisca)
                this.twinkleSpeed = 0.05 + Math.random() * 0.15;
                this.twinkleFactor = Math.random() * Math.PI;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life++;

                // Arrastar do ar suave para névoa de glitter
                this.vx *= 0.985;
                this.vy *= 0.985;
                this.vy += 0.006;

                this.twinkleFactor += this.twinkleSpeed;

                if (this.life >= this.maxLife) {
                    this.init();
                }
            }

            draw() {
                const progress = this.life / this.maxLife;
                // Piscar o brilho usando seno
                const shimmer = (Math.sin(this.twinkleFactor) + 1) / 2;
                const alpha = this.opacity * (1 - progress) * (0.3 + shimmer * 0.7);

                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;

                // Desenhar o glitter como um pequeno ponto
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Adicionar um leve brilho extra (glow) em partículas maiores
                if (this.size > 1.2) {
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = this.color;
                } else {
                    ctx.shadowBlur = 0;
                }
            }
        }

        function init() {
            setupCanvas();
            particles = [];
            // Densidade de efeito Premium (1000 partículas)
            for (let i = 0; i < 1000; i++) {
                const p = new Glitter();
                p.life = Math.random() * 100;
                particles.push(p);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            animationId = requestAnimationFrame(animate);
        }

        const resizeObserver = new ResizeObserver(() => {
            cancelAnimationFrame(animationId);
            init();
            animate();
        });

        resizeObserver.observe(container);

        window.addEventListener('load', () => {
            init();
            animate();
        });

        if (document.readyState === 'complete') {
            init();
            animate();
        }
    </script>
</body>

</html>
